version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: menuvision
      POSTGRES_USER: menuvision
      POSTGRES_PASSWORD: menuvision_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuvision"]
      interval: 5s
      timeout: 5s
      retries: 5
    # networks:
    #   - sharednet

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin_digitalmenu
      environment:
        - PGADMIN_DEFAULT_EMAIL=admin@admin.com
        - PGADMIN_DEFAULT_PASSWORD=admin
      ports:
        - "8080:80"  

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://menuvision:menuvision_dev@postgres:5432/menuvision
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-in-production
      ENVIRONMENT: development
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # frontend-admin:
  #   build: ./frontend-admin
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     VITE_API_URL: http://localhost:8000
  #   volumes:
  #     - ./frontend-admin:/app
  #     - /app/node_modules
  #   command: npm run dev -- --host 0.0.0.0


# networks:
#   sharednet:
#     external: true    


volumes:
  postgres_data:
  redis_data:
